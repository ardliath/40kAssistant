name: Deploy to GitHub Pages

# Run this workflow every time you push to the main branch
on:
  push:
    branches: [main]
  # Also allow running it manually from the Actions tab
  workflow_dispatch:

# Permissions the workflow needs to publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only let one deployment run at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build the site
        run: npm run build

      - name: Upload the built site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
